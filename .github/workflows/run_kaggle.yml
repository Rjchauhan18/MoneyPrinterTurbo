name: Run Kaggle Notebook Daily

on:
  schedule:
    # 20:30 UTC is exactly 2:00 AM IST (Indian Standard Time)
    - cron: '30 20 * * *' 
  workflow_dispatch: # Allows you to trigger it manually via the VS Code extension or GitHub UI

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Kaggle API
        run: pip install kaggle

      - name: Push and Run Notebook
        run: |
          # 1. Pull the notebook and its configuration file
          python -m kaggle kernels pull chauhanrj/ollamaserver-youtube-automation -p . -m
          
          # 2. Modify the JSON file using Python to force BOTH GPU and Internet access
          python -c "import json; f=open('kernel-metadata.json','r+'); d=json.load(f); d['enable_gpu']=True; d['enable_internet']=True; f.seek(0); json.dump(d,f,indent=4); f.truncate()"
          
          # 3. Push back to Kaggle with proper internet/hardware flags
          python -m kaggle kernels push -p .
